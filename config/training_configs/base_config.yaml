# Base Training Configuration
training:
  # General settings
  experiment_name: "football_event_detection"
  seed: 42
  device: "cuda"  # cuda, cpu, mps
  num_workers: 4
  pin_memory: true
  
  # Data settings
  dataset:
    train_split: 0.7
    val_split: 0.15
    test_split: 0.15
    shuffle: true
    stratified: true
    
  # Batch settings
  batch_size: 8
  gradient_accumulation: 1
  
  # Epoch settings
  num_epochs: 50
  validate_every: 1
  save_every: 1
  
  # Optimization
  optimizer:
    type: "adamw"
    learning_rate: 0.0001
    weight_decay: 0.0001
    eps: 1e-8
    
  scheduler:
    type: "reduce_on_plateau"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1e-6
    
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
    mode: "min"
    
  # Gradient handling
  gradient_clip:
    enabled: true
    max_norm: 1.0
    norm_type: 2
    
  # Checkpointing
  checkpoint:
    save_best: true
    save_last: true
    save_every_epoch: false
    max_checkpoints: 5
    
  # Metrics
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "auc_roc"
    - "confusion_matrix"
    
  # Logging
  logging:
    console: true
    file: true
    wandb: false
    tensorboard: false
    
    frequency:
      train_batch: 10
      val_batch: 10
      epoch: 1
      
  # Validation
  validation:
    metrics: ["loss", "accuracy", "f1_score"]
    save_predictions: true
    save_confusion_matrix: true
    
  # Testing
  testing:
    save_predictions: true
    save_metrics: true
    generate_report: true